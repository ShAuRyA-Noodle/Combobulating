name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to keep the queue cheap.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint — black, ruff, mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            agents/core/requirements.txt

      - name: Install lint deps
        run: |
          python -m pip install --upgrade pip
          pip install black==24.8.0 ruff==0.6.5 mypy==1.11.2
          if [ -f agents/core/requirements.txt ]; then
            pip install -r agents/core/requirements.txt
          fi

      - name: black --check
        run: black --check agents orchestrator memory e2e benchmarks scripts

      - name: ruff check
        run: ruff check agents orchestrator memory e2e benchmarks scripts

      - name: mypy
        run: mypy --ignore-missing-imports agents orchestrator memory

  unit-tests:
    name: Unit tests — Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: |
            agents/core/requirements.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r agents/core/requirements.txt

      - name: pytest agents + orchestrator + memory
        run: pytest agents/ orchestrator/ memory/ -v

  e2e-tests:
    name: End-to-end tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            agents/core/requirements.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r agents/core/requirements.txt

      - name: pytest e2e
        run: pytest e2e/ -v

  deck-validation:
    name: Deck validation — slides + speaker notes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Run deck validator
        run: python scripts/validate_deck.py
